<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>TADAWUL FILTERS PRO | فلاتر متقدمة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.0/lightweight-charts.standalone.production.js"></script>
<script>if(typeof LightweightCharts==='undefined'){document.write('<scr'+'ipt src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"><\/scr'+'ipt>')}</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--c0:#04060e;--c1:#080b16;--c2:#0c1020;--c3:#111628;--c4:#172030;--bd:rgba(255,255,255,.055);--bd2:rgba(255,255,255,.1);--t1:#dde3f0;--t2:#7a8ba8;--t3:#3d4a5e;--up:#0ecf7e;--dn:#f04458;--ubg:rgba(14,207,126,.08);--dbg:rgba(240,68,88,.08);--bl:#4a9eff;--bl2:rgba(74,158,255,.12);--gd:#f5c842;--pu:#a78bfa;--cy:#22d3ee;--or:#fb923c;--pk:#f472b6;--base-font:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--c0);color:var(--t1);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:var(--base-font);overflow:hidden;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;user-select:none}

/* ══ TOP BAR ══ */
.top{height:38px;background:linear-gradient(180deg,#0a0e1a,var(--c1));border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;flex-shrink:0}
.logo{font-size:14px;font-weight:700;color:var(--pu);letter-spacing:1.5px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px}
.logo-sub{font-size:9px;color:var(--gd);font-weight:600;padding:1px 6px;border:1px solid rgba(245,200,66,.2);border-radius:10px;background:rgba(245,200,66,.06)}
.top-r{margin-right:auto;display:flex;align-items:center;gap:10px}
#clk{color:var(--t2);font-size:10px;font-family:'IBM Plex Mono',monospace}
.dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.zoom-ctrl{display:flex;gap:2px;align-items:center}
.zoom-btn{width:24px;height:24px;border:1px solid var(--bd);background:var(--c3);color:var(--t2);border-radius:3px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:monospace}
.zoom-btn:hover{border-color:var(--bl);color:var(--bl);background:var(--bl2)}
#zoom-val{font-size:9px;color:var(--t2);min-width:30px;text-align:center;font-family:'IBM Plex Mono',monospace}

/* ══ MAIN LAYOUT ══ */
.main{display:flex;flex:1;min-height:0;overflow:hidden}

/* ══ LEFT: FILTERS PANEL (resizable) ══ */
.filters-panel{width:65%;min-width:300px;display:flex;flex-direction:column;border-left:1px solid var(--bd);overflow:hidden;background:var(--c1);position:relative}
.resize-handle{position:absolute;left:0;top:0;bottom:0;width:4px;cursor:col-resize;background:transparent;z-index:50;transition:background .15s}
.resize-handle:hover,.resize-handle.active{background:var(--pu)}

/* Filter tabs */
.ftabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:2px solid rgba(139,92,246,.15);flex-shrink:0;background:linear-gradient(135deg,rgba(139,92,246,.04),rgba(34,211,238,.02))}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:7px 12px;cursor:pointer;font-size:10px;color:var(--t2);border-left:1px solid var(--bd);display:flex;align-items:center;gap:4px;white-space:nowrap;position:relative;transition:all .12s;flex-shrink:0}
.ftab:hover{color:var(--t1);background:rgba(139,92,246,.06)}
.ftab.on{color:#fff;background:rgba(139,92,246,.1);font-weight:600}
.ftab.on::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--pu)}
.ftab .ficon{font-size:12px}
.ftab .fbadge{font-size:7px;padding:1px 4px;border-radius:8px;background:rgba(14,207,126,.15);color:var(--up);border:1px solid rgba(14,207,126,.2);min-width:14px;text-align:center}

/* Filter content area */
.fcontent{flex:1;overflow:auto;scrollbar-width:thin;padding:0}
.fcontent::-webkit-scrollbar{width:4px}
.fcontent::-webkit-scrollbar-thumb{background:var(--c4);border-radius:2px}

/* Scan controls */
.scan-bar{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--c2);flex-shrink:0;align-items:center;flex-wrap:wrap}
.scan-btn{padding:4px 14px;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit;border:1px solid;transition:all .15s;font-weight:600;display:flex;align-items:center;gap:4px}
.scan-main{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:var(--pu)}
.scan-main:hover{background:rgba(139,92,246,.22)}
.scan-sec{background:none;border-color:var(--bd2);color:var(--t2)}
.scan-sec:hover{border-color:var(--bl);color:var(--bl)}
.scan-sec.on{border-color:var(--up);color:var(--up);background:rgba(14,207,126,.08)}
#scan-prog{display:none;flex:1;min-width:120px}
#scan-prog.show{display:flex;align-items:center;gap:6px}
.prog-bar{flex:1;height:4px;background:var(--c3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--pu);transition:width .2s;border-radius:2px}
.prog-txt{font-size:8px;color:var(--t2);white-space:nowrap}

/* Results table */
.results-wrap{overflow:auto;flex:1;scrollbar-width:thin}
.results-wrap::-webkit-scrollbar{width:4px;height:4px}
.results-wrap::-webkit-scrollbar-thumb{background:var(--c4)}
.rtbl{width:100%;border-collapse:collapse;font-size:calc(var(--base-font) * 0.83)}
.rtbl th{position:sticky;top:0;background:var(--c2);padding:6px 8px;text-align:right;font-weight:600;color:var(--t2);border-bottom:1px solid var(--bd);cursor:pointer;white-space:nowrap;z-index:5;font-size:calc(var(--base-font) * 0.75)}
.rtbl th:hover{color:var(--bl)}
.rtbl td{padding:5px 8px;border-bottom:1px solid var(--bd);white-space:nowrap;transition:background .08s}
.rtbl tr:hover td{background:rgba(74,158,255,.04)}
.rtbl tr.hi td{background:rgba(139,92,246,.06)}

/* Tags */
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:calc(var(--base-font) * 0.67);font-weight:600;border:1px solid}
.tag-s4{background:rgba(14,207,126,.1);border-color:rgba(14,207,126,.25);color:var(--up)}
.tag-s3{background:rgba(245,200,66,.08);border-color:rgba(245,200,66,.2);color:var(--gd)}
.tag-s2{background:rgba(34,211,238,.08);border-color:rgba(34,211,238,.2);color:var(--cy)}
.tag-s1{background:rgba(240,68,88,.1);border-color:rgba(240,68,88,.25);color:var(--dn)}
.tag-s5{background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.2);color:var(--or)}
.tag-na{background:var(--c3);border-color:var(--bd);color:var(--t3)}
.tag-pu{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.25);color:var(--pu)}
.tag-pk{background:rgba(244,114,182,.08);border-color:rgba(244,114,182,.2);color:var(--pk)}

/* Signal badges */
.sig-buy{color:var(--up);font-weight:700}
.sig-sell{color:var(--dn);font-weight:700}
.sig-watch{color:var(--gd)}

/* WHY popup */
.why-row{display:none;background:rgba(139,92,246,.03)}
.why-row.show{display:table-row}
.why-cell{padding:8px 12px!important;border-bottom:2px solid rgba(139,92,246,.15)!important}
.why-box{display:flex;flex-wrap:wrap;gap:6px}
.why-item{background:var(--c3);border:1px solid var(--bd);border-radius:4px;padding:4px 8px;font-size:calc(var(--base-font) * 0.75);line-height:1.5}
.why-item b{color:var(--pu)}
.why-item .val{font-family:'IBM Plex Mono',monospace;font-weight:600}
.why-item.bull{border-right:2px solid var(--up)}
.why-item.bear{border-right:2px solid var(--dn)}
.why-item.neu{border-right:2px solid var(--gd)}

/* ══ RIGHT: CHART + AI ══ */
.right-panel{flex:1;min-width:300px;display:flex;flex-direction:column;overflow:hidden}

/* Chart header */
.chdr{padding:6px 12px;background:var(--c2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
#csym{font-size:13px;font-weight:700;color:var(--bl)}
#cprc{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace}
#cchg{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;font-family:'IBM Plex Mono',monospace}
.tfs{display:flex;gap:2px;margin-right:auto;flex-wrap:wrap}
.tf{padding:2px 7px;border:1px solid var(--bd2);background:none;border-radius:2px;color:var(--t2);cursor:pointer;font-size:9px;font-family:inherit;transition:all .1s}
.tf:hover{border-color:var(--bl);color:var(--bl)}
.tf.on{background:var(--bl);border-color:var(--bl);color:#fff}

/* Chart area */
#chart-area{flex:1;position:relative;min-height:200px;overflow:hidden}
#lw-chart{position:absolute;top:0;left:0;width:100%;height:100%}

/* AI Panel */
.ai-panel{border-top:1px solid var(--bd);flex-shrink:0;max-height:35%;overflow:auto;scrollbar-width:thin;background:var(--c1)}
.ai-panel::-webkit-scrollbar{width:4px}
.ai-panel::-webkit-scrollbar-thumb{background:var(--c4)}
.ai-hdr{padding:5px 10px;background:linear-gradient(135deg,rgba(167,139,250,.06),rgba(34,211,238,.04));border-bottom:1px solid rgba(167,139,250,.15);display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.ai-title{font-size:10px;font-weight:700;color:var(--pu)}
.ai-btn{padding:2px 10px;border-radius:3px;cursor:pointer;font-size:9px;font-family:inherit;border:1px solid rgba(167,139,250,.3);background:rgba(167,139,250,.1);color:var(--pu);transition:all .12s;font-weight:600}
.ai-btn:hover{background:rgba(167,139,250,.2)}
#ai-result{padding:8px 12px;font-size:calc(var(--base-font) * 0.83);line-height:1.7;color:var(--t2)}
#ai-result strong{color:var(--t1)}
.ai-dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--pu);animation:aiPulse .8s ease-in-out infinite}
.ai-dots span:nth-child(2){animation-delay:.15s}
.ai-dots span:nth-child(3){animation-delay:.3s}
@keyframes aiPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Score bar */
.scb{display:inline-block;width:40px;height:4px;background:var(--c3);border-radius:2px;vertical-align:middle;margin-left:3px;overflow:hidden}
.scf{height:100%;border-radius:2px}

/* Limit-Up Hunter special */
.hunter-card{background:linear-gradient(135deg,rgba(240,68,88,.04),rgba(245,200,66,.04));border:1px solid rgba(240,68,88,.15);border-radius:6px;padding:8px 12px;margin:6px}
.hunter-title{font-size:11px;font-weight:700;color:var(--dn);display:flex;align-items:center;gap:6px}
.hunter-badge{font-size:8px;padding:1px 6px;border-radius:10px;background:rgba(240,68,88,.1);color:var(--dn);border:1px solid rgba(240,68,88,.2)}

/* ══ RESPONSIVE ══ */
@media(max-width:900px){
  .main{flex-direction:column}
  .filters-panel{width:100%!important;min-height:50%;border-left:none;border-bottom:1px solid var(--bd)}
  .resize-handle{display:none}
  .right-panel{min-height:40%}
}

/* ══ EMPTY / LOADING ══ */
.empty-msg{padding:30px;text-align:center;color:var(--t3);font-size:11px}
.loading{display:flex;align-items:center;gap:6px;padding:16px;color:var(--t3);font-size:10px}
.spinner{width:14px;height:14px;border:2px solid var(--c4);border-top-color:var(--pu);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ SCROLLBAR GLOBAL ══ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--c4);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div class="top">
  <div class="logo">⚡ TADAWUL FILTERS <span class="logo-sub">PRO</span></div>
  <div class="top-r">
    <div class="zoom-ctrl">
      <button class="zoom-btn" onclick="zoomUI(-1)" title="تصغير">−</button>
      <span id="zoom-val">100%</span>
      <button class="zoom-btn" onclick="zoomUI(1)" title="تكبير">+</button>
    </div>
    <span class="dot"></span>
    <span id="clk"></span>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- LEFT: FILTERS -->
  <div class="filters-panel" id="filters-panel">
    <div class="resize-handle" id="resize-handle"></div>

    <!-- Filter Tabs -->
    <div class="ftabs" id="ftabs">
      <div class="ftab on" onclick="setFilter('all',this)"><span class="ficon">🔬</span> جميع الفلاتر <span class="fbadge" id="fb-all">0</span></div>
      <div class="ftab" onclick="setFilter('vz',this)"><span class="ficon">💧</span> انحراف السيولة</div>
      <div class="ftab" onclick="setFilter('ma',this)"><span class="ficon">🚀</span> تسارع الزخم</div>
      <div class="ftab" onclick="setFilter('rs',this)"><span class="ficon">💪</span> القوة النسبية</div>
      <div class="ftab" onclick="setFilter('sq',this)"><span class="ficon">💥</span> ضغط الانفجار</div>
      <div class="ftab" onclick="setFilter('ab',this)"><span class="ficon">🧲</span> امتصاص العروض</div>
      <div class="ftab" onclick="setFilter('fg',this)"><span class="ficon">🎯</span> فجوات صانع السوق</div>
      <div class="ftab" onclick="setFilter('hidden',this)"><span class="ficon">🕵️</span> السيولة المخفية</div>
      <div class="ftab" onclick="setFilter('pregap',this)"><span class="ficon">⚡</span> فجوة سعرية</div>
      <div class="ftab" onclick="setFilter('fvgr',this)"><span class="ficon">🧲</span> مغناطيس التوازن</div>
      <div class="ftab" onclick="setFilter('elliott',this)"><span class="ficon">🌊</span> إيليوت</div>
      <div class="ftab" onclick="setFilter('harmonic',this)"><span class="ficon">🦋</span> هارمونيك</div>
      <div class="ftab" onclick="setFilter('hunter',this)"><span class="ficon">🎪</span> صيد النسبة</div>
    </div>

    <!-- Scan Controls -->
    <div class="scan-bar">
      <button class="scan-btn scan-main" onclick="runFullScan()">🔬 مسح شامل</button>
      <button class="scan-btn scan-sec" id="btn-buy" onclick="toggleBuySell('buy',this)">▲ شراء فقط</button>
      <button class="scan-btn scan-sec" id="btn-sell" onclick="toggleBuySell('sell',this)">▼ بيع فقط</button>
      <button class="scan-btn scan-sec" id="btn-alert" onclick="toggleAlertOnly(this)">🔔 إشارات قوية</button>
      <div id="scan-prog"><div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div><span class="prog-txt" id="prog-txt"></span></div>
    </div>

    <!-- Results -->
    <div class="results-wrap" id="results-wrap">
      <table class="rtbl" id="rtbl">
        <thead id="rthead"></thead>
        <tbody id="rtbody"></tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: CHART + AI -->
  <div class="right-panel">
    <div class="chdr">
      <span id="csym">2222 — أرامكو</span>
      <span id="cprc">—</span>
      <span id="cchg">—</span>
      <div class="tfs">
        <button class="tf" onclick="setTF('1d','5m',this)">يوم</button>
        <button class="tf" onclick="setTF('5d','15m',this)">أسبوع</button>
        <button class="tf" onclick="setTF('1mo','1h',this)">شهر</button>
        <button class="tf on" onclick="setTF('3mo','1d',this)">3 أشهر</button>
        <button class="tf" onclick="setTF('6mo','1d',this)">6 أشهر</button>
        <button class="tf" onclick="setTF('1y','1wk',this)">سنة</button>
      </div>
    </div>
    <div id="chart-area"><div id="lw-chart"></div></div>

    <!-- AI Panel -->
    <div class="ai-panel">
      <div class="ai-hdr" onclick="toggleAI()">
        <span class="ai-title">✦ تحليل الذكاء الاصطناعي</span>
        <button class="ai-btn" onclick="event.stopPropagation();runAI()">🤖 تحليل AI</button>
        <span id="ai-arrow" style="margin-right:auto;color:var(--t3);font-size:10px">▼</span>
      </div>
      <div id="ai-body" style="display:none">
        <div id="ai-result"><div class="empty-msg">اختر سهماً ثم اضغط "تحليل AI"</div></div>
      </div>
    </div>
  </div>

</div>

/* ══ TECHNICAL ANALYSIS ENGINE ══ */
function sma(a,p){const r=[];for(let i=0;i<a.length;i++){if(i<p-1){r.push(null);continue;}let m=0;for(let j=i-p+1;j<=i;j++)m+=a[j];r.push(+(m/p).toFixed(4));}return r;}
function ema(a,p){const k=2/(p+1);const r=[a[0]];for(let i=1;i<a.length;i++)r.push(+(a[i]*k+r[i-1]*(1-k)).toFixed(4));return r;}
function calcRSI(a,p=14){const r=new Array(Math.min(p,a.length)).fill(null);let g=0,l=0;for(let i=1;i<Math.min(p,a.length);i++){const d=a[i]-a[i-1];d>0?g+=d:l+=Math.abs(d);}g/=p;l/=p;r.push(l===0?100:+(100-100/(1+g/l)).toFixed(2));for(let i=p;i<a.length;i++){const d=a[i]-a[i-1];g=(g*(p-1)+(d>0?d:0))/p;l=(l*(p-1)+(d<0?Math.abs(d):0))/p;r.push(l===0?100:+(100-100/(1+g/l)).toFixed(2));}return r;}
function calcBB(a,p=20){const sm=sma(a,p);return a.map((_,i)=>{if(!sm[i])return null;let s=0;for(let j=i-p+1;j<=i;j++)s+=(a[j]-sm[i])**2;const std=Math.sqrt(s/p);return{u:+(sm[i]+2*std).toFixed(2),m:+sm[i].toFixed(2),l:+(sm[i]-2*std).toFixed(2),w:+((4*std)/sm[i]*100).toFixed(2)};});}
function calcVWAP(cs){let cpv=0,cv=0;return cs.map(c=>{const tp=(c.high+c.low+c.close)/3;cpv+=tp*c.volume;cv+=c.volume;return cv?+(cpv/cv).toFixed(2):c.close;});}
function calcATR(cs,p=14){const tr=[];for(let i=1;i<cs.length;i++)tr.push(Math.max(cs[i].high-cs[i].low,Math.abs(cs[i].high-cs[i-1].close),Math.abs(cs[i].low-cs[i-1].close)));return sma(tr,p);}
function calcStoch(cs,kP=14){const k=[];for(let i=kP-1;i<cs.length;i++){let h=-Infinity,l=Infinity;for(let j=i-kP+1;j<=i;j++){if(cs[j].high>h)h=cs[j].high;if(cs[j].low<l)l=cs[j].low;}k.push(h===l?50:((cs[i].close-l)/(h-l))*100);}return{k:k[k.length-1]||50};}
function calcADX(cs,p=14){const n=cs.length;if(n<p*2)return null;let pdm=[],ndm=[],tr=[];for(let i=1;i<n;i++){pdm.push(Math.max(cs[i].high-cs[i-1].high,0));ndm.push(Math.max(cs[i-1].low-cs[i].low,0));tr.push(Math.max(cs[i].high-cs[i].low,Math.abs(cs[i].high-cs[i-1].close),Math.abs(cs[i].low-cs[i-1].close)));}let sP=0,sN=0,sT=0;for(let i=0;i<p;i++){sP+=pdm[i];sN+=ndm[i];sT+=tr[i];}const dx=[];for(let i=p;i<pdm.length;i++){sP=sP-sP/p+pdm[i];sN=sN-sN/p+ndm[i];sT=sT-sT/p+tr[i];const pi=sT?sP/sT*100:0,ni=sT?sN/sT*100:0;dx.push(pi+ni?Math.abs(pi-ni)/(pi+ni)*100:0);}if(dx.length<p)return null;let adx=0;for(let i=0;i<p;i++)adx+=dx[i];adx/=p;for(let i=p;i<dx.length;i++)adx=(adx*(p-1)+dx[i])/p;return +adx.toFixed(1);}

function calcInd(sym){

  const bbA=calcBB(cl,20);const vwapA=calcVWAP(cs);const atrA=calcATR(cs,14);

/* 1. انحراف السيولة اللحظي */
function calcVolumeZScore(cs){
  if(!cs||cs.length<20) return{z:0,sig:'—',color:'na',why:''};
  const vols=cs.map(c=>c.volume),n=Math.min(20,vols.length);
  const recent=vols.slice(-n);
  const mean=recent.reduce((a,b)=>a+b,0)/n;
  const std=Math.sqrt(recent.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/n)||1;
  const lastVol=vols[vols.length-1];
  const lastClose=cs[cs.length-1].close,prevClose=cs[cs.length-2]?.close||lastClose;
  const z=(lastVol-mean)/std;
  const bullish=lastClose>=prevClose;
  let sig='—',color='na',why='';
  if(z>=3){sig=bullish?'سيولة شراء عنيفة':'سيولة بيع عنيفة';color=bullish?'s4':'s1';why=`الحجم (${fK(lastVol)}) تجاوز +${z.toFixed(1)} انحراف معياري عن المتوسط (${fK(Math.round(mean))}) — سيولة غير عادية ${bullish?'مع صعود السعر ← تجميع مؤسسي':'مع هبوط ← تصريف'}`;}
  else if(z>=2){sig='مرتفع';color='s3';why=`الحجم أعلى من المتوسط بـ ${z.toFixed(1)} انحراف — نشاط ملحوظ`;}
  else if(z>=1){sig='طبيعي+';color='na';why=`حجم تداول ضمن النطاق الطبيعي`;}
  else{sig='هادئ';why='حجم تداول منخفض';}
  return{z:+z.toFixed(2),sig,color,bullish,alert:z>=3,why};
}

/* 2. تسارع الزخم */
function calcMomentumAccel(cs){
  if(!cs||cs.length<15) return{accel:0,sig:'—',color:'na',why:''};
  const cl=cs.map(c=>c.close),n=cl.length;
  const roc=d=>n>d?((cl[n-1]-cl[n-1-d])/cl[n-1-d]*100):0;
  const r3=roc(3),r5=roc(5),r10=roc(10);
  const accel=r5-r10;
  const jerk=r3-r5;
  let sig='—',color='na',why='';
  if(accel>2&&jerk>0.5){sig='تسارع قوي ↑';color='s4';why=`ROC(5)=${r5.toFixed(1)}% − ROC(10)=${r10.toFixed(1)}% = تسارع +${accel.toFixed(1)}% مع معدل تغير +${jerk.toFixed(1)}% ← الزخم يتسارع بقوة`;}
  else if(accel>1){sig='تسارع ↑';color='s2';why=`تسارع إيجابي +${accel.toFixed(1)}% — الزخم يزداد`;}
  else if(accel<-2&&jerk<-0.5){sig='تباطؤ قوي ↓';color='s1';why=`تباطؤ حاد ${accel.toFixed(1)}% مع تسارع سلبي ${jerk.toFixed(1)}% ← فقدان الزخم`;}
  else if(accel<-1){sig='تباطؤ ↓';color='s5';why=`الزخم يتباطأ بمقدار ${accel.toFixed(1)}%`;}
  else{sig='محايد';why='لا تسارع ملحوظ';}
  return{accel:+accel.toFixed(2),jerk:+jerk.toFixed(2),sig,color,alert:Math.abs(accel)>2,why};
}

/* 3. القوة النسبية ضد السوق */
function calcRelativeStrength(cs,marketROC){
  if(!cs||cs.length<20) return{rs:1,sig:'—',color:'na',why:''};
  const cl=cs.map(c=>c.close),n=cl.length;
  const stockROC=n>20?((cl[n-1]-cl[n-21])/cl[n-21]*100):0;
  const rs=marketROC!==0?stockROC/Math.abs(marketROC):stockROC>0?1.5:0.5;
  let sig='—',color='na',why='';
  if(rs>1.8){sig='أقوى بكثير ↑↑';color='s4';why=`أداء السهم (${stockROC.toFixed(1)}%) يفوق السوق (${marketROC.toFixed(1)}%) بنسبة RS=${rs.toFixed(1)} ← تفوق واضح`;}
  else if(rs>1.2){sig='أقوى ↑';color='s2';why=`السهم يتفوق على السوق — RS=${rs.toFixed(1)}`;}
  else if(rs<0.5){sig='أضعف ↓↓';color='s1';why=`أداء السهم (${stockROC.toFixed(1)}%) أضعف بكثير من السوق (${marketROC.toFixed(1)}%) — RS=${rs.toFixed(1)}`;}
  else if(rs<0.8){sig='أضعف ↓';color='s5';why=`السهم أضعف من السوق — RS=${rs.toFixed(1)}`;}
  else{sig='مماثل ↔';why=`أداء مشابه للسوق`;}
  return{rs:+rs.toFixed(2),stockROC:+stockROC.toFixed(2),sig,color,alert:rs>1.8||rs<0.5,why};
}

/* 4. ضغط الانفجار الوشيك (BB Squeeze) */
function calcBBSqueeze(cs){
  if(!cs||cs.length<25) return{squeeze:false,sig:'—',color:'na',why:''};
  const cl=cs.map(c=>c.close),n=cl.length,p=20;
  const ma20=cl.slice(-p).reduce((a,b)=>a+b,0)/p;
  const std20=Math.sqrt(cl.slice(-p).map(v=>(v-ma20)**2).reduce((a,b)=>a+b,0)/p);
  const bbU=ma20+2*std20,bbL=ma20-2*std20,bbW=bbU-bbL;
  const ema20arr=ema(cl,20),kc_mid=ema20arr[n-1];
  const atrArr=calcATR(cs,14),atr14=atrArr[atrArr.length-1]||cl[n-1]*.01;
  const kcU=kc_mid+1.5*atr14,kcL=kc_mid-1.5*atr14;
  const squeeze=bbU<kcU&&bbL>kcL;
  const mid=(kcU+kcL)/2;
  const diffs=cl.slice(-5).map(v=>v-mid);
  const hist=diffs.reduce((a,b)=>a+b,0)/diffs.length;
  const fired=!squeeze;
  let sig='—',color='na',why='';
  if(squeeze){sig='ضغط نشط 🔴';color='s1';why=`بولنجر (${bbW.toFixed(2)}) داخل كيلتنر (${(kcU-kcL).toFixed(2)}) ← طاقة مضغوطة جاهزة للانفجار — انتظر الاتجاه`;}
  else if(fired&&hist>0){sig='انطلاق ↑ 🚀';color='s4';why=`انتهى الضغط مع زخم إيجابي (${hist.toFixed(3)}) ← انفجار صعودي محتمل`;}
  else if(fired&&hist<0){sig='انطلاق ↓ 📉';color='s5';why=`انتهى الضغط مع زخم سلبي (${hist.toFixed(3)}) ← انفجار هبوطي محتمل`;}
  else{sig='طبيعي';why='لا ضغط حالياً';}
  const ratio=bbW/(kcU-kcL||1);
  return{squeeze,hist:+hist.toFixed(3),ratio:+ratio.toFixed(3),sig,color,alert:squeeze||(fired&&Math.abs(hist)>atr14*.1),why};
}

/* 5. امتصاص العروض والتجميع */
function calcVolumeAbsorption(cs){
  if(!cs||cs.length<15) return{score:0,sig:'—',color:'na',why:''};
  const n=cs.length,avgVol=cs.slice(-20).map(c=>c.volume).reduce((a,b)=>a+b,0)/Math.min(20,n);
  let absScore=0,details=[];
  for(let i=Math.max(0,n-3);i<n;i++){
    const c=cs[i],body=Math.abs(c.close-c.open),range=c.high-c.low||.001;
    const volRatio=c.volume/avgVol;
    const lowerWick=(Math.min(c.close,c.open)-c.low)/range;
    if(c.close<c.open&&volRatio>1.8&&lowerWick>0.35){absScore+=volRatio*lowerWick*100;details.push(`شمعة بيعية بذيل سفلي ${(lowerWick*100).toFixed(0)}% وحجم ×${volRatio.toFixed(1)} ← امتصاص عروض`);}
    if(c.close>c.open&&volRatio>2&&c.close/c.high>0.92){absScore+=volRatio*50;details.push(`إغلاق قرب الأعلى مع حجم ×${volRatio.toFixed(1)} ← قوة شرائية`);}
    if(c.close<c.open&&volRatio>2&&c.close/c.low<1.02){absScore-=volRatio*40;details.push(`إغلاق قرب الأدنى مع حجم ×${volRatio.toFixed(1)} ← توزيع`);}
  }
  const strength=Math.min(100,Math.abs(absScore));
  let sig='—',color='na';
  if(absScore>80){sig='امتصاص قوي جداً';color='s4';}
  else if(absScore>40){sig='امتصاص ↑';color='s2';}
  else if(absScore<-80){sig='توزيع قوي';color='s1';}
  else if(absScore<-40){sig='توزيع ↓';color='s5';}
  else{sig='محايد';color='na';}
  return{score:+absScore.toFixed(1),strength:Math.round(strength),sig,color,alert:Math.abs(absScore)>80,why:details.join(' | ')||'لا نمط امتصاص واضح'};
}

/* 6. فجوات صانع السوق FVG */
function calcFVG(cs){
  if(!cs||cs.length<10) return{gaps:[],nearest:null,sig:'—',color:'na',why:''};
  const n=cs.length,gaps=[];
  for(let i=2;i<n;i++){
    if(cs[i].low>cs[i-2].high){const size=(cs[i].low-cs[i-2].high)/cs[i].close*100;if(size>0.2)gaps.push({type:'bu',top:cs[i].low,bot:cs[i-2].high,idx:i,size:+size.toFixed(2),filled:cs[n-1].close<=cs[i].low&&cs[n-1].close>=cs[i-2].high});}
    if(cs[i].high<cs[i-2].low){const size=(cs[i-2].low-cs[i].high)/cs[i].close*100;if(size>0.2)gaps.push({type:'be',top:cs[i-2].low,bot:cs[i].high,idx:i,size:+size.toFixed(2),filled:cs[n-1].close>=cs[i].high&&cs[n-1].close<=cs[i-2].low});}
  }
  const cur=cs[n-1].close;
  const active=gaps.filter(g=>!g.filled&&n-g.idx<=30);
  let nearest=null,minDist=Infinity;
  for(const g of active){const mid=(g.top+g.bot)/2;const dist=Math.abs(cur-mid)/cur*100;if(dist<minDist){minDist=dist;nearest=g;}}
  let sig='—',color='na',why='';
  if(nearest){
    const dist=((nearest.type==='bu'?nearest.bot:nearest.top)-cur)/cur*100;
    if(nearest.type==='bu'&&dist<0&&dist>-3){sig='FVG دعم ↑';color='s4';}
    else if(nearest.type==='be'&&dist>0&&dist<3){sig='FVG مقاومة ↓';color='s1';}
    else if(nearest.type==='bu'){sig='FVG صعودي';color='s2';}
    else{sig='FVG هبوطي';color='s5';}
    why=`فجوة ${nearest.type==='bu'?'صعودية':'هبوطية'} بين ${nearest.bot.toFixed(2)}-${nearest.top.toFixed(2)} (${nearest.size}%) على بعد ${minDist.toFixed(1)}% من السعر ← منطقة ${nearest.type==='bu'?'دعم':'مقاومة'} لصانع السوق`;
  }else{why='لا فجوات نشطة';}
  return{gaps:active,nearest,sig,color,count:active.length,alert:!!nearest&&minDist<2,why};
}

/* ══ 3 ALGORITHMIC COMMANDS ══ */

/* Command 1: السيولة المخفية (Iceberg Orders) */
function calcHiddenLiquidity(cs){
  if(!cs||cs.length<20) return{detected:false,sig:'—',color:'na',why:''};
  const n=cs.length;
  let iceScore=0,details=[];
  for(let i=Math.max(5,n-10);i<n;i++){
    const priceChange=Math.abs(cs[i].close-cs[i-1].close)/cs[i-1].close*100;
    const volChange=cs[i].volume/(cs[i-1].volume||1);
    const avgVol5=cs.slice(Math.max(0,i-5),i).map(c=>c.volume).reduce((a,b)=>a+b,0)/5;
    const volRatio=cs[i].volume/avgVol5;
    /* Iceberg: small price change + steadily increasing value = hidden orders */
    if(priceChange<0.5&&volRatio>1.5&&cs[i].close>=cs[i-1].close){
      iceScore+=volRatio*10;
      details.push(`شمعة ${i-n+1+n}: تغير سعري ${priceChange.toFixed(2)}% مع حجم ×${volRatio.toFixed(1)} ← أوامر جبلية`);
    }
    /* Check for absorption at lows */
    const isNearLow=cs[i].low<=Math.min(...cs.slice(Math.max(0,i-20),i).map(c=>c.low))*1.01;
    if(isNearLow&&volRatio>2&&cs[i].close>cs[i].open){
      iceScore+=25;
      details.push(`امتصاص عند القاع الزمني مع حجم مرتفع ← تجميع هامور`);
    }
  }
  let sig='—',color='na';
  if(iceScore>60){sig='أوامر جبلية مكتشفة 🕵️';color='s4';}
  else if(iceScore>30){sig='نشاط مشبوه';color='s3';}
  else{sig='طبيعي';}
  return{score:+iceScore.toFixed(0),detected:iceScore>30,sig,color,alert:iceScore>60,why:details.join(' | ')||'لا أوامر جبلية مكتشفة'};
}

/* Command 2: التنبؤ بالفجوات السعرية (Pre-Gap) */
function calcPreGap(cs){
  if(!cs||cs.length<20) return{prob:0,sig:'—',color:'na',why:''};
  const n=cs.length;
  const last15=cs.slice(-Math.min(3,n));/* simulate last 15min candles with last 3 daily */
  const sessionAvg=cs.slice(-20).map(c=>c.volume).reduce((a,b)=>a+b,0)/20;
  const recentVol=last15.map(c=>c.volume).reduce((a,b)=>a+b,0)/last15.length;
  const volDeviation=recentVol/sessionAvg;
  /* Volatility Squeeze: BB width narrowing */
  const cl=cs.map(c=>c.close);
  const bb=calcBB(cl,20);
  const bbw5=bb.slice(-5).filter(Boolean).map(b=>b.w);
  const bbwAvg=bbw5.reduce((a,b)=>a+b,0)/bbw5.length;
  const bbw20=bb.slice(-20).filter(Boolean).map(b=>b.w);
  const bbw20Avg=bbw20.reduce((a,b)=>a+b,0)/bbw20.length;
  const volSqueeze=bbwAvg<bbw20Avg*0.7;
  /* Combined probability */
  let prob=0;
  if(volDeviation>2)prob+=35;
  else if(volDeviation>1.5)prob+=20;
  if(volSqueeze)prob+=30;
  const rsi=G.ind[cs[0]?.time?undefined:undefined]||{};
  const momentum=Math.abs((cl[n-1]-cl[n-4])/cl[n-4]*100);
  if(momentum>3)prob+=25;
  else if(momentum>1.5)prob+=15;
  prob=Math.min(95,prob);
  let sig='—',color='na',why='';
  if(prob>=60){sig=`قاب محتمل ${prob}% ⚡`;color='s4';why=`${volDeviation>2?`حجم نهاية الجلسة ×${volDeviation.toFixed(1)} من المتوسط`:''}${volSqueeze?' | تقلص بولنجر (ضغط) ← طاقة مختزنة':''}${momentum>3?` | زخم نهائي +${momentum.toFixed(1)}%`:''}  ← احتمال فجوة افتتاحية ${prob}%`;}
  else if(prob>=35){sig=`رصد ${prob}%`;color='s3';why=`مؤشرات ضعيفة لفجوة — احتمال ${prob}%`;}
  else{sig='طبيعي';why='لا مؤشرات لفجوة';}
  return{prob,volDeviation:+volDeviation.toFixed(2),volSqueeze,sig,color,alert:prob>=60,why};
}

/* Command 3: مغناطيس التوازن FVG Rebalance */
function calcFVGRebalance(cs){
  if(!cs||cs.length<15) return{sig:'—',color:'na',why:'',rebalance:null};
  const n=cs.length,cur=cs[n-1].close;
  const gaps=[];
  for(let i=2;i<n;i++){
    if(cs[i].low>cs[i-2].high){gaps.push({type:'bu',top:cs[i].low,bot:cs[i-2].high,idx:i});}
    if(cs[i].high<cs[i-2].low){gaps.push({type:'be',top:cs[i-2].low,bot:cs[i].high,idx:i});}
  }
  const unfilled=gaps.filter(g=>n-g.idx<=40);
  let best=null,bestDist=Infinity;
  for(const g of unfilled){
    const ce50=(g.top+g.bot)/2;/* 50% Consequent Encroachment */
    const dist=Math.abs(cur-ce50)/cur*100;
    if(dist<bestDist){bestDist=dist;best={...g,ce50,dist};}
  }
  /* Check if price is touching the 50% level + momentum acceleration */
  const cl=cs.map(c=>c.close);
  const roc3=cl.length>3?((cl[n-1]-cl[n-4])/cl[n-4]*100):0;
  const momVelocity=Math.abs(roc3);
  let sig='—',color='na',why='';
  if(best&&best.dist<1.5&&momVelocity>1){
    sig=best.type==='bu'?'ارتداد من FVG ↑ 🧲':'رفض من FVG ↓ 🧲';
    color=best.type==='bu'?'s4':'s1';
    why=`السعر عند 50% من فجوة ${best.type==='bu'?'صعودية':'هبوطية'} (${best.bot.toFixed(2)}-${best.top.toFixed(2)}) ← CE@${best.ce50.toFixed(2)} مع تسارع زخم ${roc3.toFixed(1)}% ← ارتداد مرتقب`;
  }else if(best&&best.dist<3){
    sig=`قرب FVG (${best.dist.toFixed(1)}%)`;color='s3';
    why=`السعر على بعد ${best.dist.toFixed(1)}% من مستوى 50% للفجوة عند ${best.ce50.toFixed(2)}`;
  }else{sig='لا ارتداد';why='لا فجوات قريبة للارتداد';}
  return{sig,color,rebalance:best,momVelocity:+momVelocity.toFixed(2),alert:best&&best.dist<1.5&&momVelocity>1,why};
}

/* ══ ELLIOTT & HARMONIC ══ */
function calcZigZag(cs,depth=4){if(!cs||cs.length<depth*2)return[];const n=cs.length,pvts=[];for(let i=depth;i<n-depth;i++){const isH=cs[i].high>=Math.max(...cs.slice(i-depth,i).map(c=>c.high))&&cs[i].high>=Math.max(...cs.slice(i+1,i+depth+1).map(c=>c.high));const isL=cs[i].low<=Math.min(...cs.slice(i-depth,i).map(c=>c.low))&&cs[i].low<=Math.min(...cs.slice(i+1,i+depth+1).map(c=>c.low));if(isH)pvts.push({i,p:cs[i].high,type:'H'});if(isL)pvts.push({i,p:cs[i].low,type:'L'});}pvts.sort((a,b)=>a.i-b.i);const clean=[];for(const pv of pvts){if(!clean.length){clean.push(pv);continue;}const last=clean[clean.length-1];if(last.type===pv.type){if(pv.type==='H'&&pv.p>last.p)clean[clean.length-1]=pv;else if(pv.type==='L'&&pv.p<last.p)clean[clean.length-1]=pv;}else{if(Math.abs(pv.p-last.p)/last.p*100>=0.3)clean.push(pv);}}return clean;}

function detectHarmonic(cs){
  const zz=calcZigZag(cs,3);if(zz.length<5)return null;
  const DEFS=[['Gartley',.58,.65,.35,.9,1.2,1.7,.73,.82,true],['Bat',.35,.52,.35,.9,1.6,2.7,.82,.9,true],['Butterfly',.73,.82,.35,.9,1.6,2.26,1.25,1.4,false],['Crab',.35,.62,.35,.9,2.22,3.14,1.58,1.66,true],['Shark',.44,.52,1.1,1.65,1.6,2.26,.85,1.15,true],['Cypher',.38,.62,1.1,1.44,.7,.8,.77,.82,true]];
  let best=null,bestScore=0;
  for(let xi=0;xi<zz.length-4;xi++){const X=zz[xi],A=zz[xi+1],B=zz[xi+2],C=zz[xi+3],D=zz[zz.length-1];const XA=Math.abs(A.p-X.p);if(!XA)continue;const AB=Math.abs(B.p-A.p),BC=Math.abs(C.p-B.p),CD=Math.abs(D.p-C.p);if(!AB||!BC)continue;const rXAB=AB/XA,rABC=BC/AB,rBCD=BC>0?CD/BC:0;for(const[name,xl,xh,al,ah,bl,bh,xdl,xdh,bull]of DEFS){if(rXAB<xl||rXAB>xh||rABC<al||rABC>ah)continue;const bcdOk=rBCD>=bl&&rBCD<=bh,forming=!bcdOk&&rBCD>=bl*0.7;if(!bcdOk&&!forming)continue;const score=100-Math.abs(rXAB-(xl+xh)/2)/(xl+xh)*40-Math.abs(rABC-(al+ah)/2)/(al+ah)*30-Math.abs(rBCD-(bl+bh)/2)/(bl+bh)*30;if(score>bestScore){bestScore=score;const bullish=bull?(D.p<X.p):(D.p>X.p);best={name,sig:bullish?'شراء':'بيع',forming:!bcdOk,completion:bcdOk?100:Math.min(99,Math.round(rBCD/bl*100)),score:Math.round(score),why:`نموذج ${name} ${bullish?'صعودي':'هبوطي'} — اكتمال ${bcdOk?100:Math.round(rBCD/bl*100)}% — النسب: XAB=${rXAB.toFixed(3)} ABC=${rABC.toFixed(3)} BCD=${rBCD.toFixed(3)}`};}}}
  return best;
}

function detectElliott(cs){
  const cl=cs.map(c=>c.close),n=cl.length;if(n<30)return{sig:'محايد',wave:0,why:'بيانات غير كافية'};
  const roc=d=>n>d?((cl[n-1]-cl[n-1-d])/cl[n-1-d]*100):0;
  const r3=+roc(3).toFixed(2),r7=+roc(7).toFixed(2),r14=+roc(14).toFixed(2),r30=+roc(30).toFixed(2);
  let wave=0,sig='محايد',desc='',why='';
  if(r30>10&&r14>5&&r7>2){wave=3;sig='شراء';desc='الموجة ③ الدافعة';why=`ROC30=+${r30}% ROC14=+${r14}% ROC7=+${r7}% ← الموجة الثالثة (أقوى موجات الصعود)`;}
  else if(r30>6&&r7<0){wave=4;sig='محايد';desc='الموجة ④ تصحيحية';why=`صعود 30 يوم +${r30}% لكن تراجع أسبوعي ${r7}% ← تصحيح طبيعي`;}
  else if(r30>4&&r7>0&&r3<-1){wave=5;sig='بيع';desc='الموجة ⑤ نهاية';why=`الموجة الخامسة تستنفد — ROC3 سلبي ${r3}% ← نهاية الصعود`;}
  else if(r30<-8&&r14<-4){wave=-1;sig='بيع';desc='موجة C هبوطية';why=`هبوط حاد — ROC30=${r30}% ROC14=${r14}% ← موجة C تصحيحية`;}
  else if(r7>0&&r14<0){wave=1;sig='شراء';desc='الموجة ① بداية صعود';why=`انعكاس أسبوعي +${r7}% بعد هبوط ← بداية موجة صاعدة جديدة`;}
  else{why='لا موجة واضحة';}
  return{sig,wave,desc,why};
}

/* ══ LIMIT-UP HUNTER ══ */
function calcLimitUpHunter(cs,sym){
  if(!cs||cs.length<20) return{score:0,sig:'—',color:'na',why:'',alerts:[]};
  const n=cs.length,alerts=[];
  let score=0;
  /* 1. Volume Anomaly: last candle vol > 3 std dev of 5-day avg */
  const vol5=cs.slice(-5).map(c=>c.volume);
  const vol5Mean=vol5.reduce((a,b)=>a+b,0)/5;
  const vol5Std=Math.sqrt(vol5.map(v=>(v-vol5Mean)**2).reduce((a,b)=>a+b,0)/5)||1;
  const lastVol=cs[n-1].volume;
  const volZ=(lastVol-vol5Mean)/vol5Std;
  if(volZ>=3){score+=35;alerts.push({t:'انحراف الفوليوم',d:`الحجم +${volZ.toFixed(1)}σ عن متوسط 5 أيام (${fK(Math.round(vol5Mean))}) ← حجم ${fK(lastVol)} غير عادي`,c:'bull'});}

  /* 2. Liquidity Choke: Ask side thinning (simulate with candle analysis) */
  const lastC=cs[n-1];
  const upperWick=lastC.high-Math.max(lastC.close,lastC.open);
  const body=Math.abs(lastC.close-lastC.open);
  const range=lastC.high-lastC.low||.001;
  if(lastC.close>lastC.open&&upperWick/range<0.1&&body/range>0.7){
    score+=30;alerts.push({t:'اختناق السيولة',d:`شمعة بجسم ${(body/range*100).toFixed(0)}% بلا ظل علوي ← العروض تتلاشى`,c:'bull'});
  }

  /* 3. Momentum Acceleration: RSI crosses 60 upward with steep slope */
  const ind=G.ind[sym];
  if(ind){
    const rsi=ind.rsi,rsiA=ind.rsiA;
    const prevRSI=rsiA&&rsiA.length>2?rsiA[rsiA.length-2]:50;
    if(rsi>60&&prevRSI<=60){
      score+=25;alerts.push({t:'تسارع الزخم',d:`RSI قطع 60 صعوداً (${prevRSI?.toFixed(1)}→${rsi.toFixed(1)}) مع ميل حاد`,c:'bull'});
    }
    /* RSI momentum slope */
    if(rsi>55&&rsi-prevRSI>5){
      score+=10;alerts.push({t:'ميل RSI',d:`ارتفاع RSI بـ ${(rsi-prevRSI).toFixed(1)} نقطة ← تسارع لحظي`,c:'bull'});
    }
  }
  score=Math.min(100,score);
  let sig='—',color='na';
  if(score>=70){sig='🎪 صيد النسبة!';color='s4';}
  else if(score>=45){sig='رصد عالي';color='s3';}
  else if(score>=25){sig='رصد';color='s2';}
  else{sig='—';}
  return{score,sig,color,alerts,alert:score>=45,why:alerts.map(a=>`[${a.t}] ${a.d}`).join(' | ')||'لا إشارات صيد النسبة'};
}

/* ══════════════════════════════════════════════════
   COMBINED SCAN
══════════════════════════════════════════════════ */
function calcAllFilters(sym,marketROC){
  const cs=G.cans[sym];if(!cs||cs.length<15)return null;
  const vz=calcVolumeZScore(cs);
  const ma=calcMomentumAccel(cs);
  const rs=calcRelativeStrength(cs,marketROC);
  const sq=calcBBSqueeze(cs);
  const ab=calcVolumeAbsorption(cs);
  const fg=calcFVG(cs);
  const hidden=calcHiddenLiquidity(cs);
  const pregap=calcPreGap(cs);
  const fvgr=calcFVGRebalance(cs);
  const ew=detectElliott(cs);
  const harm=detectHarmonic(cs);
  const hunter=calcLimitUpHunter(cs,sym);

  let bullAlerts=0,bearAlerts=0;
  if(vz.alert){vz.bullish?bullAlerts++:bearAlerts++;}
  if(ma.alert){ma.accel>0?bullAlerts++:bearAlerts++;}
  if(rs.alert){rs.rs>1?bullAlerts++:bearAlerts++;}
  if(sq.alert){sq.hist>0?bullAlerts++:bearAlerts++;}
  if(ab.alert){ab.score>0?bullAlerts++:bearAlerts++;}
  if(fg.alert){fg.nearest?.type==='bu'?bullAlerts++:bearAlerts++;}
  if(hidden.alert)bullAlerts++;
  if(pregap.alert)bullAlerts++;
  if(fvgr.alert){fvgr.rebalance?.type==='bu'?bullAlerts++:bearAlerts++;}
  if(ew.sig==='شراء')bullAlerts++;else if(ew.sig==='بيع')bearAlerts++;
  if(harm?.sig==='شراء')bullAlerts++;else if(harm?.sig==='بيع')bearAlerts++;
  if(hunter.alert)bullAlerts++;

  let sig='—',cls='sig-watch';
  if(bullAlerts>=4){sig='▲ شراء قوي جداً';cls='sig-buy';}
  else if(bullAlerts>=3){sig='▲ شراء قوي';cls='sig-buy';}
  else if(bullAlerts>=2){sig='▲ شراء';cls='sig-buy';}
  else if(bearAlerts>=3){sig='▼ بيع قوي';cls='sig-sell';}
  else if(bearAlerts>=2){sig='▼ بيع';cls='sig-sell';}
  else if(bullAlerts===1){sig='◎ رصد';cls='sig-watch';}

  const score=bullAlerts*10-bearAlerts*8+50;
  return{sym,vz,ma,rs,sq,ab,fg,hidden,pregap,fvgr,ew,harm,hunter,sig,cls,score:Math.max(0,Math.min(100,score)),bullAlerts,bearAlerts};
}

/* ══ SCAN ENGINE ══ */
async function runFullScan(){
  const prog=document.getElementById('scan-prog'),fill=document.getElementById('prog-fill'),txt=document.getElementById('prog-txt');
  prog.classList.add('show');
  _advData=[];

  /* Market ROC */
  const loaded=STKS.filter(s=>G.cans[s.sym]&&G.cans[s.sym].length>20);
  let totalROC=0,cnt=0;
  for(const s of loaded){const cl=G.cans[s.sym].map(c=>c.close),n=cl.length;if(n>20){totalROC+=((cl[n-1]-cl[n-21])/cl[n-21]*100);cnt++;}}
  const marketROC=cnt>0?totalROC/cnt:0;

  const total=STKS.length;let done=0;
  for(let i=0;i<STKS.length;i+=8){
    const batch=STKS.slice(i,i+8);
    for(const s of batch){
      if(!G.cans[s.sym]||G.cans[s.sym].length<15){try{await loadStock(s.sym);}catch(e){}}
      const res=calcAllFilters(s.sym,marketROC);
      if(res)_advData.push({...res,name:s.name,price:G.pr[s.sym]||0,pct:G.pc[s.sym]||0});
      done++;
      fill.style.width=Math.round(done/total*100)+'%';
      txt.textContent=`${done}/${total} — وجد ${_advData.filter(d=>d.sig.includes('▲')).length} فرصة`;
    }
    await new Promise(r=>setTimeout(r,20));
    if(done%24===0||done===total)renderResults();
  }
  prog.classList.remove('show');
  updateBadges();
  renderResults();
}

function updateBadges(){
  const alerts=_advData.filter(d=>d.sig.includes('▲')||d.sig.includes('▼')).length;
  document.getElementById('fb-all').textContent=alerts;
}

/* ══ FILTER & SORT ══ */
function setFilter(f,el){
  _filter=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderResults();
}
function toggleBuySell(type,btn){
  if(type==='buy'){_buyOnly=!_buyOnly;_sellOnly=false;btn.classList.toggle('on',_buyOnly);document.getElementById('btn-sell').classList.remove('on');}
  else{_sellOnly=!_sellOnly;_buyOnly=false;btn.classList.toggle('on',_sellOnly);document.getElementById('btn-buy').classList.remove('on');}
  renderResults();
}
function toggleAlertOnly(btn){_alertOnly=!_alertOnly;btn.classList.toggle('on',_alertOnly);renderResults();}
function sortResults(col){_sortDir=_sortCol===col?_sortDir*-1:-1;_sortCol=col;renderResults();}

function toggleWhy(sym){
  _whyOpen[sym]=!_whyOpen[sym];
  const row=document.getElementById('why-'+sym);
  if(row)row.classList.toggle('show',_whyOpen[sym]);
}

/* ══ TABLE HEADERS BY FILTER ══ */
function getHeaders(){
  const base='<th onclick="sortResults(\'sym\')">الرمز</th><th>الاسم</th><th onclick="sortResults(\'price\')">السعر</th><th onclick="sortResults(\'pct\')">%</th>';
  const end='<th onclick="sortResults(\'score\')">النتيجة</th><th>الإشارة</th><th>شرح</th>';
  const cols={
    all:`${base}<th onclick="sortResults(\'vz\')">سيولة</th><th onclick="sortResults(\'ma_a\')">زخم</th><th onclick="sortResults(\'rs_v\')">RS</th><th onclick="sortResults(\'sq_s\')">ضغط</th><th onclick="sortResults(\'ab_s\')">امتصاص</th><th onclick="sortResults(\'fg_c\')">FVG</th>${end}`,
    vz:`${base}<th>Z-Score</th><th>الحالة</th><th>الحجم</th>${end}`,
    ma:`${base}<th>التسارع</th><th>Jerk</th><th>الحالة</th>${end}`,
    rs:`${base}<th>RS</th><th>ROC السهم</th><th>الحالة</th>${end}`,
    sq:`${base}<th>الضغط</th><th>Histogram</th><th>Ratio</th>${end}`,
    ab:`${base}<th>درجة</th><th>قوة</th><th>الحالة</th>${end}`,
    fg:`${base}<th>فجوات</th><th>أقرب</th><th>الحالة</th>${end}`,
    hidden:`${base}<th>درجة</th><th>مكتشف</th><th>الحالة</th>${end}`,
    pregap:`${base}<th>احتمال</th><th>Vol Dev</th><th>الحالة</th>${end}`,
    fvgr:`${base}<th>زخم</th><th>مسافة</th><th>الحالة</th>${end}`,
    elliott:`${base}<th>الموجة</th><th>الوصف</th><th>الإشارة</th>${end}`,
    harmonic:`${base}<th>النموذج</th><th>اكتمال</th><th>الإشارة</th>${end}`,
    hunter:`${base}<th>درجة</th><th>إنذارات</th><th>الحالة</th>${end}`,
  };
  return cols[_filter]||cols.all;
}

/* ══ RENDER TABLE ══ */
function renderResults(){
  document.getElementById('rthead').innerHTML='<tr>'+getHeaders()+'</tr>';

  let data=[..._advData];

  /* Filter */
  if(_filter!=='all'){
    data=data.filter(d=>{
      if(_filter==='vz')return d.vz.alert||d.vz.z>=1.5;
      if(_filter==='ma')return d.ma.alert||Math.abs(d.ma.accel)>0.8;
      if(_filter==='rs')return d.rs.alert||d.rs.rs>1.3||d.rs.rs<0.7;
      if(_filter==='sq')return d.sq.alert||d.sq.squeeze;
      if(_filter==='ab')return d.ab.alert||Math.abs(d.ab.score)>30;
      if(_filter==='fg')return d.fg.alert||d.fg.count>0;
      if(_filter==='hidden')return d.hidden.detected;
      if(_filter==='pregap')return d.pregap.prob>=30;
      if(_filter==='fvgr')return d.fvgr.alert||d.fvgr.rebalance;
      if(_filter==='elliott')return d.ew.wave!==0;
      if(_filter==='harmonic')return !!d.harm;
      if(_filter==='hunter')return d.hunter.score>=25;
      return true;
    });
  }
  if(_buyOnly)data=data.filter(d=>d.sig.includes('▲'));
  if(_sellOnly)data=data.filter(d=>d.sig.includes('▼'));
  if(_alertOnly)data=data.filter(d=>d.bullAlerts>=2||d.bearAlerts>=2);

  /* Sort */
  data.sort((a,b)=>{
    let av,bv;
    switch(_sortCol){
      case'sym':av=a.sym;bv=b.sym;return(av>bv?1:-1)*_sortDir;
      case'price':av=a.price;bv=b.price;break;
      case'pct':av=a.pct;bv=b.pct;break;
      case'vz':av=a.vz.z;bv=b.vz.z;break;
      case'ma_a':av=a.ma.accel;bv=b.ma.accel;break;
      case'rs_v':av=a.rs.rs;bv=b.rs.rs;break;
      case'sq_s':av=a.sq.squeeze?1:0;bv=b.sq.squeeze?1:0;break;
      case'ab_s':av=a.ab.score;bv=b.ab.score;break;
      case'fg_c':av=a.fg.count;bv=b.fg.count;break;
      default:av=a.score;bv=b.score;
    }
    return((+av||0)>(+bv||0)?1:(+av||0)<(+bv||0)?-1:0)*_sortDir;
  });

  const tag=(c,l)=>`<span class="tag tag-${c}">${l}</span>`;
  const rows=data.slice(0,100).map(d=>{
    const pcCol=d.pct>=0?'var(--up)':'var(--dn)';
    const ir=G.ld.has(d.sym);

    let midCols='';
    if(_filter==='all'){
      midCols=`<td>${tag(d.vz.color,`Z:${d.vz.z}`)}</td><td>${tag(d.ma.color,d.ma.accel>0?'+'+d.ma.accel:d.ma.accel)}</td><td>${tag(d.rs.color,`RS:${d.rs.rs}`)}</td><td>${tag(d.sq.color,d.sq.squeeze?'🔴':'—')}</td><td>${tag(d.ab.color,d.ab.score>0?'+'+d.ab.strength+'%':d.ab.score.toFixed(0))}</td><td>${tag(d.fg.color,d.fg.count?'FVG'+d.fg.count:'—')}</td>`;
    }else if(_filter==='vz'){
      midCols=`<td style="font-family:monospace;font-weight:600;color:${d.vz.z>=3?'var(--up)':d.vz.z>=2?'var(--gd)':'var(--t2)'}">${d.vz.z}</td><td>${tag(d.vz.color,d.vz.sig)}</td><td style="font-family:monospace">${fK(G.vo[d.sym]||0)}</td>`;
    }else if(_filter==='ma'){
      midCols=`<td style="font-family:monospace;font-weight:600;color:${d.ma.accel>1?'var(--up)':d.ma.accel<-1?'var(--dn)':'var(--t2)'}">${d.ma.accel>0?'+':''}${d.ma.accel}%</td><td style="font-family:monospace">${d.ma.jerk>0?'+':''}${d.ma.jerk}%</td><td>${tag(d.ma.color,d.ma.sig)}</td>`;
    }else if(_filter==='rs'){
      midCols=`<td style="font-family:monospace;font-weight:600;color:${d.rs.rs>1.5?'var(--up)':d.rs.rs<0.7?'var(--dn)':'var(--t2)'}">${d.rs.rs}</td><td style="font-family:monospace">${d.rs.stockROC>0?'+':''}${d.rs.stockROC}%</td><td>${tag(d.rs.color,d.rs.sig)}</td>`;
    }else if(_filter==='sq'){
      midCols=`<td>${d.sq.squeeze?tag('s1','🔴 ضغط نشط'):tag('na','—')}</td><td style="font-family:monospace">${d.sq.hist}</td><td style="font-family:monospace">${d.sq.ratio}</td>`;
    }else if(_filter==='ab'){
      midCols=`<td style="font-family:monospace;font-weight:600;color:${d.ab.score>40?'var(--up)':d.ab.score<-40?'var(--dn)':'var(--t2)'}">${d.ab.score>0?'+':''}${d.ab.score}</td><td>${d.ab.strength}%</td><td>${tag(d.ab.color,d.ab.sig)}</td>`;
    }else if(_filter==='fg'){
      midCols=`<td style="font-family:monospace">${d.fg.count}</td><td>${d.fg.nearest?tag(d.fg.color,d.fg.nearest.type==='bu'?'↑ صعودي':'↓ هبوطي'):tag('na','—')}</td><td>${tag(d.fg.color,d.fg.sig)}</td>`;
    }else if(_filter==='hidden'){
      midCols=`<td style="font-family:monospace;font-weight:600">${d.hidden.score}</td><td>${d.hidden.detected?tag('s4','مكتشف 🕵️'):tag('na','—')}</td><td>${tag(d.hidden.color,d.hidden.sig)}</td>`;
    }else if(_filter==='pregap'){
      midCols=`<td style="font-family:monospace;font-weight:600;color:${d.pregap.prob>=60?'var(--up)':d.pregap.prob>=35?'var(--gd)':'var(--t2)'}">${d.pregap.prob}%</td><td style="font-family:monospace">${d.pregap.volDeviation}×</td><td>${tag(d.pregap.color,d.pregap.sig)}</td>`;
    }else if(_filter==='fvgr'){
      midCols=`<td style="font-family:monospace">${d.fvgr.momVelocity}%</td><td>${d.fvgr.rebalance?d.fvgr.rebalance.dist.toFixed(1)+'%':'—'}</td><td>${tag(d.fvgr.color,d.fvgr.sig)}</td>`;
    }else if(_filter==='elliott'){
      midCols=`<td style="font-weight:600;color:var(--gd)">${d.ew.wave>0?'موجة '+d.ew.wave:d.ew.wave<0?'موجة C':'—'}</td><td style="font-size:calc(var(--base-font)*0.75)">${d.ew.desc||'—'}</td><td>${tag(d.ew.sig==='شراء'?'s4':d.ew.sig==='بيع'?'s1':'na',d.ew.sig)}</td>`;
    }else if(_filter==='harmonic'){
      midCols=`<td style="font-weight:600;color:var(--pu)">${d.harm?'🦋 '+d.harm.name:'—'}</td><td>${d.harm?d.harm.completion+'%':'—'}</td><td>${d.harm?tag(d.harm.sig==='شراء'?'s4':'s1',d.harm.sig):tag('na','—')}</td>`;
    }else if(_filter==='hunter'){
      midCols=`<td><span class="scb"><span class="scf" style="width:${d.hunter.score}%;background:${d.hunter.score>=70?'var(--up)':d.hunter.score>=45?'var(--gd)':'var(--dn)'}"></span></span> ${d.hunter.score}%</td><td style="font-family:monospace">${d.hunter.alerts.length}</td><td>${tag(d.hunter.color,d.hunter.sig)}</td>`;
    }

    return`<tr class="${d.score>75?'hi':''}" onclick="selectStock('${d.sym}')" style="cursor:pointer">
      <td style="font-weight:700;color:var(--bl);font-family:'IBM Plex Mono',monospace">${ir?'<span style="color:var(--up);font-size:7px">●</span>':''}${d.sym}</td>
      <td style="max-width:90px;overflow:hidden;text-overflow:ellipsis">${d.name}</td>
      <td style="font-family:monospace">${d.price>0?d.price.toFixed(2):'—'}</td>
      <td style="color:${pcCol};font-family:monospace">${d.pct>=0?'+':''}${d.pct.toFixed(2)}%</td>
      ${midCols}
      <td><span class="scb"><span class="scf" style="width:${d.score}%;background:${d.score>70?'var(--up)':d.score>50?'var(--gd)':'var(--dn)'}"></span></span>${d.score}%</td>
      <td><span class="${d.cls}" style="font-weight:700">${d.sig}</span></td>
      <td><button onclick="event.stopPropagation();toggleWhy('${d.sym}')" style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);color:var(--pu);padding:1px 8px;border-radius:3px;cursor:pointer;font-size:calc(var(--base-font)*0.75);font-family:inherit">لماذا؟</button></td>
    </tr>
    <tr class="why-row ${_whyOpen[d.sym]?'show':''}" id="why-${d.sym}">
      <td colspan="20" class="why-cell">
        <div style="font-size:calc(var(--base-font)*0.75);font-weight:700;color:var(--pu);margin-bottom:6px">📋 لماذا ظهر ${d.sym} (${d.name}) في الفلتر:</div>
        <div class="why-box">
          ${d.vz.z>=1.5?`<div class="why-item ${d.vz.bullish?'bull':'bear'}"><b>💧 السيولة:</b> <span class="val">${d.vz.why}</span></div>`:''}
          ${Math.abs(d.ma.accel)>0.8?`<div class="why-item ${d.ma.accel>0?'bull':'bear'}"><b>🚀 الزخم:</b> <span class="val">${d.ma.why}</span></div>`:''}
          ${(d.rs.rs>1.3||d.rs.rs<0.7)?`<div class="why-item ${d.rs.rs>1?'bull':'bear'}"><b>💪 القوة النسبية:</b> <span class="val">${d.rs.why}</span></div>`:''}
          ${d.sq.squeeze||d.sq.alert?`<div class="why-item ${d.sq.hist>0?'bull':'bear'}"><b>💥 الضغط:</b> <span class="val">${d.sq.why}</span></div>`:''}
          ${Math.abs(d.ab.score)>25?`<div class="why-item ${d.ab.score>0?'bull':'bear'}"><b>🧲 الامتصاص:</b> <span class="val">${d.ab.why}</span></div>`:''}
          ${d.fg.count>0?`<div class="why-item ${d.fg.nearest?.type==='bu'?'bull':'bear'}"><b>🎯 FVG:</b> <span class="val">${d.fg.why}</span></div>`:''}
          ${d.hidden.detected?`<div class="why-item bull"><b>🕵️ السيولة المخفية:</b> <span class="val">${d.hidden.why}</span></div>`:''}
          ${d.pregap.prob>=30?`<div class="why-item bull"><b>⚡ فجوة سعرية:</b> <span class="val">${d.pregap.why}</span></div>`:''}
          ${d.fvgr.rebalance?`<div class="why-item ${d.fvgr.rebalance?.type==='bu'?'bull':'bear'}"><b>🧲 مغناطيس:</b> <span class="val">${d.fvgr.why}</span></div>`:''}
          ${d.ew.wave!==0?`<div class="why-item ${d.ew.sig==='شراء'?'bull':d.ew.sig==='بيع'?'bear':'neu'}"><b>🌊 إيليوت:</b> <span class="val">${d.ew.why}</span></div>`:''}
          ${d.harm?`<div class="why-item ${d.harm.sig==='شراء'?'bull':'bear'}"><b>🦋 هارمونيك:</b> <span class="val">${d.harm.why}</span></div>`:''}
          ${d.hunter.alerts.length>0?`<div class="why-item bull"><b>🎪 صيد النسبة:</b> <span class="val">${d.hunter.why}</span></div>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('rtbody').innerHTML=rows||'<tr><td colspan="20" class="empty-msg">اضغط "مسح شامل" لبدء الفحص</td></tr>';
}

/* ══ CHART ENGINE ══ */
function initChart(){
  const ct=document.getElementById('lw-chart');if(!ct||typeof LightweightCharts==='undefined')return;
  G.lwChart=LightweightCharts.createChart(ct,{
    width:ct.clientWidth,height:ct.clientHeight,
    layout:{background:{type:'solid',color:'#04060e'},textColor:'#7a8ba8',fontFamily:"'IBM Plex Mono',monospace"},
    grid:{vertLines:{color:'rgba(255,255,255,.03)'},horzLines:{color:'rgba(255,255,255,.03)'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'rgba(122,139,168,.4)',labelBackgroundColor:'#111628'},horzLine:{color:'rgba(122,139,168,.4)',labelBackgroundColor:'#111628'}},
    rightPriceScale:{borderColor:'rgba(255,255,255,.055)',scaleMargins:{top:.06,bottom:.2}},
    timeScale:{borderColor:'rgba(255,255,255,.055)',rightOffset:8,timeVisible:true},
    handleScroll:{mouseWheel:true,pressedMouseMove:true,horzTouchDrag:true},
    handleScale:{mouseWheel:true,pinch:true,axisPressedMouseMove:true},
  });
  G.cSeries=G.lwChart.addCandlestickSeries({upColor:'#0ecf7e',downColor:'#f04458',borderUpColor:'#0ecf7e',borderDownColor:'#f04458',wickUpColor:'rgba(14,207,126,.6)',wickDownColor:'rgba(240,68,88,.6)'});
  G.vSeries=G.lwChart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
  G.lwChart.priceScale('vol').applyOptions({scaleMargins:{top:.85,bottom:0}});
  const addLine=(col,lw)=>G.lwChart.addLineSeries({color:col,lineWidth:lw,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  G.series.s20=addLine('#f5c842',1);G.series.s50=addLine('#a78bfa',1);
  new ResizeObserver(()=>{if(G.lwChart){G.lwChart.applyOptions({width:ct.clientWidth,height:ct.clientHeight});}}).observe(ct);
}

function updateChart(sym){
  if(!G.lwChart||!G.cSeries||!G.cans[sym])return;
  const cs=G.cans[sym],ind=G.ind[sym];
  G.cSeries.setData(cs.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));
  G.vSeries.setData(cs.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?'rgba(14,207,126,.12)':'rgba(240,68,88,.12)'})));
  if(ind?.sma20)G.series.s20.setData(cs.map((c,i)=>ind.sma20[i]!=null?{time:c.time,value:ind.sma20[i]}:null).filter(Boolean));
  if(ind?.sma50)G.series.s50.setData(cs.map((c,i)=>ind.sma50[i]!=null?{time:c.time,value:ind.sma50[i]}:null).filter(Boolean));
  G.lwChart.timeScale().fitContent();
}

function updateHeader(sym){
  const p=G.pr[sym]||0,ch=G.ch[sym]||0,pc=G.pc[sym]||0,s=STKS.find(x=>x.sym===sym),ir=G.ld.has(sym);
  document.getElementById('csym').textContent=`${sym} — ${s?.name||''}`;
  document.getElementById('cprc').textContent=p>0?`${p.toFixed(2)} ر.س`:'—';
  const ce=document.getElementById('cchg');
  if(ch!==0){ce.textContent=`${ch>=0?'+':''}${ch.toFixed(2)} (${pc.toFixed(2)}%)`;ce.style.color=ch>=0?'var(--up)':'var(--dn)';ce.style.background=ch>=0?'var(--ubg)':'var(--dbg)';}
  else{ce.textContent='—';ce.style.background='transparent';}
}

function selectStock(sym){
  G.sel=sym;updateHeader(sym);updateChart(sym);
  if(!G.ld.has(sym)&&!G.ldg.has(sym)){loadStock(sym).then(()=>{calcInd(sym);updateHeader(sym);updateChart(sym);});}
}

function setTF(range,interval,el){
  G.tf=range;G.tfi=interval;document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  const sym=G.sel;delete G.cans[sym];G.ld.delete(sym);G.ldg.delete(sym);
  loadStock(sym,range,interval).then(()=>{calcInd(sym);updateHeader(sym);updateChart(sym);});
}

/* ══ AI ══ */
function toggleAI(){_aiOpen=!_aiOpen;document.getElementById('ai-body').style.display=_aiOpen?'block':'none';document.getElementById('ai-arrow').textContent=_aiOpen?'▲':'▼';}

async function runAI(){
  if(!_aiOpen)toggleAI();
  const sym=G.sel,p=G.pr[sym],ind=G.ind[sym];
  if(!p){alert('انتظر تحميل البيانات');return;}
  document.getElementById('ai-result').innerHTML='<div class="loading"><div class="spinner"></div>جاري التحليل بالذكاء الاصطناعي...</div>';
  const s=STKS.find(x=>x.sym===sym);
  const advD=_advData.find(d=>d.sym===sym);
  let advInfo='';
  if(advD){
    advInfo=`\nالفلاتر المتقدمة:\n- انحراف السيولة: Z=${advD.vz.z} (${advD.vz.sig})\n- تسارع الزخم: ${advD.ma.accel}% (${advD.ma.sig})\n- القوة النسبية: RS=${advD.rs.rs} (${advD.rs.sig})\n- ضغط الانفجار: ${advD.sq.sig}\n- الامتصاص: ${advD.ab.sig} (${advD.ab.score})\n- FVG: ${advD.fg.sig}\n- السيولة المخفية: ${advD.hidden.sig}\n- فجوة سعرية: ${advD.pregap.sig} (${advD.pregap.prob}%)\n- مغناطيس التوازن: ${advD.fvgr.sig}`;
    if(advD.ew.wave)advInfo+=`\n- إيليوت: موجة ${advD.ew.wave} — ${advD.ew.desc}`;
    if(advD.harm)advInfo+=`\n- هارمونيك: ${advD.harm.name} ${advD.harm.sig} اكتمال ${advD.harm.completion}%`;
    if(advD.hunter.score>0)advInfo+=`\n- صيد النسبة: ${advD.hunter.sig} (${advD.hunter.score}%)`;
  }
  const prompt=`أنت محلل فني خبير في الأسواق السعودية. حلل السهم بدقة وشمولية.
السهم: ${sym} — ${s?.name||''} | القطاع: ${s?.sec||''} | السعر: ${p.toFixed(2)} ريال
${ind?`RSI:${ind.rsi?.toFixed(1)} MACD:${ind.macd?.v>ind.macd?.s?'صعودي':'هبوطي'} MA20:${ind.ma20} MA50:${ind.ma50} ADX:${ind.adx||'-'}`:''}
${advInfo}
اكتب تحليلاً فنياً احترافياً بالعربية يشمل:
1. تقييم كل فلتر متقدم ولماذا أعطى إشارته
2. الاتجاه العام والإشارات الرئيسية
3. نقاط الدخول والأهداف والوقف
4. المخاطر والتحذيرات`;
  try{
    const rsp=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    if(!rsp.ok)throw new Error(`HTTP ${rsp.status}`);
    const d=await rsp.json();const txt=d.content?.[0]?.text||d.error||'تعذر التحليل';
    const fmt=txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    document.getElementById('ai-result').innerHTML=`<div style="border:1px solid rgba(167,139,250,.15);border-radius:6px;padding:10px;background:rgba(167,139,250,.03)"><div style="font-size:calc(var(--base-font)*0.83);font-weight:700;color:var(--pu);margin-bottom:6px">✦ تحليل ${sym} — ${Tm()}</div><div style="line-height:1.8">${fmt}</div></div><div style="font-size:calc(var(--base-font)*0.67);color:var(--t3);margin-top:4px;text-align:center">للأغراض التعليمية فقط</div>`;
  }catch(e){document.getElementById('ai-result').innerHTML=`<div style="padding:12px;font-size:calc(var(--base-font)*0.83)"><div style="color:var(--dn);margin-bottom:6px">⚠ ${e.message}</div><div style="color:var(--t2);line-height:1.7">لتفعيل AI:<br>1. Vercel Dashboard → Settings<br>2. أضف: <code style="color:var(--gd)">ANTHROPIC_API_KEY</code><br>3. أعد النشر</div></div>`;}
}

/* ══ ZOOM / RESIZE ══ */
function zoomUI(dir){
  _zoomLevel=Math.max(70,Math.min(150,_zoomLevel+dir*10));
  document.documentElement.style.setProperty('--base-font',(_zoomLevel/100*12)+'px');
  document.getElementById('zoom-val').textContent=_zoomLevel+'%';
  if(G.lwChart){const ct=document.getElementById('lw-chart');G.lwChart.applyOptions({width:ct.clientWidth,height:ct.clientHeight});}
}

/* Resize handle */
(function(){
  const handle=document.getElementById('resize-handle');
  const panel=document.getElementById('filters-panel');
  let dragging=false,startX,startW;
  handle.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startW=panel.offsetWidth;handle.classList.add('active');document.body.style.cursor='col-resize';e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!dragging)return;const dx=startX-e.clientX;panel.style.width=Math.max(300,startW+dx)+'px';if(G.lwChart){const ct=document.getElementById('lw-chart');G.lwChart.applyOptions({width:ct.clientWidth,height:ct.clientHeight});}});
  document.addEventListener('mouseup',()=>{if(dragging){dragging=false;handle.classList.remove('active');document.body.style.cursor='';}});
})();

/* ══ INIT ══ */
function init(){
  STKS.forEach(s=>initDemo(s.sym));
  initChart();
  updateHeader('2222');
  updateChart('2222');
  renderResults();
  setInterval(()=>{document.getElementById('clk').textContent=Tm();},1000);
  /* Load priority stocks */
  setTimeout(async()=>{
    await Promise.allSettled(PRI.slice(0,8).map(s=>loadStock(s)));
    PRI.forEach(sym=>{calcInd(sym);});
    updateHeader(G.sel);updateChart(G.sel);
  },300);
  setTimeout(async()=>{
    await Promise.allSettled(PRI.slice(8).map(s=>loadStock(s)));
    PRI.forEach(sym=>calcInd(sym));
  },2000);
  setTimeout(async()=>{
    const rest=STKS.filter(s=>!PRI.includes(s.sym)).map(s=>s.sym);
    for(let i=0;i<rest.length;i+=6){
      await Promise.allSettled(rest.slice(i,i+6).map(s=>loadStock(s)));
      await new Promise(r=>setTimeout(r,300));
    }
  },4000);
}

window.addEventListener('load',()=>{
  const CDNs=['https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js','https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.0/lightweight-charts.standalone.production.js'];
  let cdnIdx=0;
  function tryInit(){
    if(typeof LightweightCharts!=='undefined'){requestAnimationFrame(()=>requestAnimationFrame(init));return;}
    if(cdnIdx>=CDNs.length){console.error('Failed to load LightweightCharts from all CDNs');init();return;}
    const s=document.createElement('script');
    s.src=CDNs[cdnIdx++];
    s.onload=()=>{if(typeof LightweightCharts!=='undefined')requestAnimationFrame(()=>requestAnimationFrame(init));else tryInit();};
    s.onerror=()=>tryInit();
    document.head.appendChild(s);
  }
  tryInit();
});
</script>
